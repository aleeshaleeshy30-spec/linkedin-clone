<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn - Professional Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 font-sans">
    <!-- Navbar -->
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-2">
                    <div class="w-9 h-9 bg-blue-600 rounded flex items-center justify-center text-white font-bold text-2xl">in</div>
                    <span class="text-2xl font-semibold text-blue-600">LinkedIn</span>
                </div>
                <div class="hidden md:flex items-center bg-gray-100 rounded-md px-4 py-2 w-96">
                    <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                    <input id="search-input" type="text" placeholder="Search" 
                           class="ml-3 bg-transparent outline-none flex-1 text-sm"
                           onkeyup="if(event.key === 'Enter') searchContent()">
                </div>
            </div>

            <div class="flex items-center gap-8 text-gray-600">
                <a href="#" onclick="showSection('feed')" class="hover:text-blue-600"><i class="fa-solid fa-house text-xl"></i></a>
                <a href="#" onclick="showSection('network')" class="hover:text-blue-600"><i class="fa-solid fa-users text-xl"></i></a>
                <a href="#" onclick="showSection('jobs')" class="hover:text-blue-600"><i class="fa-solid fa-briefcase text-xl"></i></a>
                <a href="#" onclick="showProfile()" class="hover:text-blue-600"><i class="fa-solid fa-user text-xl"></i></a>
                <button onclick="showPostModal()" class="bg-blue-600 text-white px-5 py-1.5 rounded-full text-sm font-medium">Post</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-6 flex gap-6">
        <!-- Left Sidebar - Profile -->
        <div class="w-72 hidden lg:block bg-white rounded-xl p-6 shadow">
            <div onclick="showProfile()" class="flex items-center gap-4 cursor-pointer">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-white text-2xl">JD</div>
                <div>
                    <p class="font-semibold">John Doe</p>
                    <p class="text-sm text-gray-500">Software Engineer</p>
                </div>
            </div>
            <div class="mt-8 space-y-4 text-sm">
                <div class="flex justify-between"><span class="text-gray-500">Connections</span><span class="font-semibold">248</span></div>
                <div class="flex justify-between"><span class="text-gray-500">Profile Views</span><span class="font-semibold">42</span></div>
            </div>
        </div>

        <!-- Main Feed -->
        <div id="feed-section" class="section flex-1">
            <div class="bg-white rounded-xl p-5 shadow mb-6">
                <div onclick="showPostModal()" class="flex items-center gap-4 border border-gray-200 rounded-full px-6 py-3 cursor-pointer hover:bg-gray-50">
                    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">👋</div>
                    <p class="text-gray-500">Start a post...</p>
                </div>
            </div>
            <div id="feed-posts" class="space-y-6"></div>
        </div>

        <!-- Right Sidebar - Trending / Jobs -->
        <div class="w-80 hidden xl:block">
            <div class="bg-white rounded-xl p-5 shadow">
                <h3 class="font-semibold mb-4">Trending in Tech</h3>
                <div class="space-y-4 text-sm">
                    <div>#AIRevolution</div>
                    <div>#Web3</div>
                    <div>#RemoteWork</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Post Creation Modal -->
    <div id="post-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl w-full max-w-lg mx-4">
            <div class="p-6 border-b flex justify-between">
                <h3 class="font-semibold text-xl">Create a post</h3>
                <button onclick="closePostModal()" class="text-3xl leading-none">×</button>
            </div>
            <textarea id="post-content" placeholder="What do you want to talk about?" class="w-full h-52 p-6 outline-none resize-none"></textarea>
            <div class="p-6 border-t flex justify-end">
                <button onclick="createPost()" class="bg-blue-600 text-white px-8 py-3 rounded-full font-medium">Post</button>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full mx-4">
            <h2 class="text-2xl font-bold mb-6">Sign in to LinkedIn</h2>
            <input id="login-email" type="text" placeholder="Email" class="w-full p-4 border rounded-xl mb-4">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-semibold">Sign In</button>
            <p onclick="closeLoginModal()" class="text-center mt-6 text-blue-600 cursor-pointer">Close</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
